    <radialGradient id="haloGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1D9E75" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1D9E75" stop-opacity="0"/>
    </radialGradient>

    <clipPath id="mainCircle">
      <circle cx="600" cy="600" r="540"/>
    </clipPath>
