<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <defs>
    <!-- Background radial -->
    <radialGradient id="bgGrad" cx="50%" cy="48%" r="52%">
      <stop offset="0%" stop-color="#12202e"/>
      <stop offset="100%" stop-color="#080f17"/>
    </radialGradient>

    <!-- Fiber glow effects via filter approximation (solid, no blur) -->

    <!-- FSL amber gradient along fiber -->
    <linearGradient id="fslA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF9F27" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#EF9F27" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#EF9F27" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="fslB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#BA7517" stop-opacity="0.15"/>
      <stop offset="60%" stop-color="#EF9F27" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FAC775" stop-opacity="0.2"/>
    </linearGradient>

    <!-- MRtrix teal gradient -->
    <linearGradient id="mrtA" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1D9E75" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#1D9E75" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#5DCAA5" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="mrtB" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0F6E56" stop-opacity="0.2"/>
      <stop offset="60%" stop-color="#1D9E75" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#9FE1CB" stop-opacity="0.2"/>
    </linearGradient>

    <!-- DIPY purple gradient -->
    <linearGradient id="dipA" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7F77DD" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#7F77DD" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#AFA9EC" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="dipB" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#534AB7" stop-opacity="0.2"/>
      <stop offset="60%" stop-color="#7F77DD" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#CECBF6" stop-opacity="0.15"/>
    </linearGradient>

    <!-- Extra cross fibers -->
    <linearGradient id="blueA" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#378ADD" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#378ADD" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#378ADD" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="pinkA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4537E" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#D4537E" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#D4537E" stop-opacity="0.1"/>
    </linearGradient>

    <!-- Center glow rings -->
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
